{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Book Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link href="{% static 'sidebar.css' %}" rel="stylesheet">
    </head>
    <body>
        <!--Sidebar-->
        <nav id="sidebar" class="d-flex flex-column p-3">

  <a href="#" class="text-white text-decoration-none mb-4 fs-5 fw-bold">
        Book Management
  </a>

  <!-- Nav Links -->
  <ul class="nav nav-pills flex-column gap-1 flex-grow-1">
    <li class="nav-item">
      <a href="#" class="nav-link active text-white-50" data-target="page-view">
        <i class="bi bi-eye"></i> View Books
      </a>
    </li>
    <li class="nav-item hidden" id="createLink">
      <a href="#" class="nav-link text-white-50" data-target="page-create">
        <i class="bi bi-plus-lg"></i> Add Book
      </a>
    </li>
    <li class="nav-item hidden" id="adminLink">
        <a href="/admin/" class="nav-link text-white-50" data-target="page-redir">
        <i class="bi bi-arrow-up-right"></i> Go to Admin Panel
      </a>
    </li>
  </ul>
    <div class="text-white-50 small mt-3">
    Logged in as <strong class="text-white" id="user_text">~~~</strong>
    <br>
    <button class="btn btn-sm btn-danger" onclick="logOut()"><i class="bi bi-box-arrow-right"></i> Log Out</button>
  </div>

</nav>

    <!--Moble overlay-->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <!--toggle button-->
    <button id="sidebarToggle" class="btn btn-dark btn-sm" onclick="toggleSidebar()">
  <i class="bi bi-layout-sidebar"></i>
    </button>
    <!--main content for creation-->
    <div id="main-content">
        <div style="margin-top: 2.5rem;">
                       <!-- Create page -->
                <div id="page-create" style="display:none">
 
                    <h2 class="mb-3">Add a new book</h2>
 
                    <form id="creation">
                        <!-- Basic Data -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Book Name</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" class="form-control" id="author" name="author" required>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" class="form-control" id="price" name="price" required>
                        </div>
                        <div class="mb-3">
                            <label for="cat" class="form-label">Category Selection</label>
                            <div id="create_select_cat">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-2">Add Book</button>
                    </form>
                </div>

  <!--view items-->
  <div id="page-view">
      <h2 class="mb-3">View books</h2>
                    <button class="btn btn-primary" onclick="fetchItems()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh Books
                    </button>
                    <p id="fetch_status" class="text-danger mt-2" style="display:none"></p>
                    <!-- Search bar -->
<div class="row mt-4 mb-3 g-2">
    <div class="col-sm-4">
        <select class="form-select" id="filterField">
            <option value="">Select field...</option>
        </select>
    </div>
    <div class="col-sm-6">
        <input type="text" class="form-control" id="filterValue" placeholder="Search..." oninput="applyFilter()">
    </div>
    <div class="col-sm-2">
        <button class="btn btn-outline-secondary w-100" onclick="clearFilter()">Clear</button>
    </div>
</div>
                    <div id="items-list" class="mt-4"></div>
  </div>
   </div>
  </div>
  <div class="modal fade" id="infoModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title me-auto" id="infoModalLabel">Item Details</h5>
                <div class="ms-auto d-flex gap-2 me-2">
                    
                <button class="btn btn-sm btn-outline-secondary me-2 hidden" onclick="editItem()" id="editBtn"><i class="bi bi-pencil"></i> Edit</button>
                <button class="btn btn-sm btn-danger me-2 hidden" onclick="deleteItem()" id="deleteBtn"><i class="bi bi-trash3"></i> Delete</button>
                </div>
            </div>
            <div class="modal-body" id="infoModalBody">
                Loading...
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="modal_button_close">Close</button>
            </div>
        </div>
    </div>
</div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'viewer.js' %}"></script>
</html>
