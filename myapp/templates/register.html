{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
            <div class="card-body p-4">
                <h1 class="card-title h4 mb-4 text-center">Register</h1>
                <form id="register_form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input name="username" id="username" type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email (optional)</label>
                        <input name="email" id="email" type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input name="password" id="password" type="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password confirmation</label>
                        <input name="password_conf" id="password_conf" type="password" class="form-control" required>
                    </div>
                    <div class="d-grid mt-4">
                        <input type="submit" value="Register" class="btn btn-primary">
                    </div>
                </form>
                <br>
                <div style="text-align: center;">
                <a class="text-muted" href="/">Click here to log in.</a>
                </div>
            </div>
        </div>
    </body>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'register.js' %}"></script>
</html>
