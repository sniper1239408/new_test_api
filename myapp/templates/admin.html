{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Admin Panel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link href="{% static 'sidebar.css' %}" rel="stylesheet">
    </head>
    <body>
        <nav id="sidebar" class="d-flex flex-column p-3">
 
  <!-- Brand / Logo -->
  <a href="#" class="text-white text-decoration-none mb-4 fs-5 fw-bold">
    Admin Panel
  </a>
 
  <!-- Nav Links -->
  <ul class="nav nav-pills flex-column gap-1 flex-grow-1">
    <li class="nav-item">
      <a href="#" class="nav-link active text-white-50" data-target="page-users">
        <i class="bi bi-person-circle"></i> Users
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link text-white-50" data-target="page-groups">
        <i class="bi bi-people-fill"></i> Groups
      </a>
      <a href="/viewer/" class="nav-link text-white-50" data-target="page-redir">
        <i class="bi bi-arrow-up-right"></i> Go to Viewer Panel
      </a>
    </li>
    <!-- ADD MORE LINKS HERE -->
  </ul>

  <div class="text-white-50 small mt-3">
    Logged in as <strong class="text-white" id="user_text">~~~</strong>
    <br>
    <button class="btn btn-sm btn-danger" onclick="logOut()"><i class="bi bi-box-arrow-right"></i> Log Out</button>
  </div>
 
</nav>
 
<!-- Mobile overlay (closes sidebar on tap) -->
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
 
<!-- ══════════════════════════════════════════
     TOGGLE BUTTON
     ══════════════════════════════════════════ -->
<button id="sidebarToggle" class="btn btn-dark btn-sm" onclick="toggleSidebar()">
  <i class="bi bi-layout-sidebar"></i>
</button>
 
<!-- ══════════════════════════════════════════
     MAIN CONTENT — put your page here
     ══════════════════════════════════════════ -->
<div id="main-content">
    <div style="margin-top: 2.5rem;">

 <div id="page-users">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="mb-0">Users</h1>
    <button class="btn btn-primary" onclick="fetchUsers()">
      <i class="bi bi-arrow-clockwise me-1"></i> Refresh Users
    </button>
  </div>
  <p id="users_status" class="text-danger" style="display:none"></p>
  <div id="users-list"></div>
</div>

<div id="page-groups" style="display: none;">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="mb-0">Groups</h1>
    <button class="btn btn-primary" onclick="fetchGroups()">
      <i class="bi bi-arrow-clockwise me-1"></i> Refresh Groups
    </button>
  </div>
  <p id="groups_status" class="text-danger" style="display:none"></p>
  <div id="groups-list"></div>
</div>

 </div>
</div>

    <!-- User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="userModalLabel">User Details</h5>
        <div class="ms-auto d-flex gap-2 me-2">
          <button class="btn btn-sm btn-outline-secondary" id="userEditBtn" onclick="toggleUserEdit()">
            <i class="bi bi-pencil"></i> Edit
          </button>
          <button class="btn btn-sm btn-success d-none" id="userSaveBtn" onclick="saveUser()">
            <i class="bi bi-check-lg"></i> Save
          </button>
          <button class="btn btn-sm btn-outline-secondary d-none" id="userCancelBtn" onclick="cancelUserEdit()">
            <i class="bi bi-x-lg"></i> Cancel
          </button>
        </div>
      </div>
      <div class="modal-body" id="userModalBody">Loading...</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Group Modal -->
<div class="modal fade" id="groupModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="groupModalLabel">Group Details</h5>
        <div class="ms-auto d-flex gap-2 me-2">
          <button class="btn btn-sm btn-outline-secondary" id="groupEditBtn" onclick="toggleGroupEdit()">
            <i class="bi bi-pencil"></i> Edit
          </button>
          <button class="btn btn-sm btn-success d-none" id="groupSaveBtn" onclick="saveGroup()">
            <i class="bi bi-check-lg"></i> Save
          </button>
          <button class="btn btn-sm btn-outline-secondary d-none" id="groupCancelBtn" onclick="cancelGroupEdit()">
            <i class="bi bi-x-lg"></i> Cancel
          </button>
        </div>
      </div>
      <div class="modal-body" id="groupModalBody">Loading...</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'admin.js' %}"></script>
</html>
